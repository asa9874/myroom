services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - myroom-network
    # Nginx는 메모리를 아주 적게 쓰므로 32MB로 제한
    deploy:
      resources:
        limits:
          memory: 32M

  app:
    image: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: app
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,s3
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-0000}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # [추가] JVM 메모리 제한: 최소 128MB, 최대 256MB 할당
      JAVA_OPTS: "-Xms128m -Xmx256m"
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - myroom-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "netstat", "-tlnp", "|", "grep", ":8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # 컨테이너 전체 메모리 한계를 350MB로 설정
    deploy:
      resources:
        limits:
          memory: 350M

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    # [수정] 메모리 다이어트 옵션 추가
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=128M
      - --max-connections=20
      - --innodb-log-buffer-size=8M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: myroom
      MYSQL_USER: myroom
      MYSQL_PASSWORD: ${DB_PASSWORD:-0000}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - myroom-network
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      # [추가] 메모리 임계값 70% 상향 및 페이징 시점 40%로 하향
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RELATIVE: 0.7
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark_paging_ratio 0.4"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - myroom-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  myroom-network:
    driver: local